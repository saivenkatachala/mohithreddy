*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{font-family:var(--font);transition:background .3s,color .3s;min-height:100vh}
body.light{background:#f5f7fa;color:#111827}
body.dark{background:#0f1117;color:#f1f5f9}

body.light .card{background:#fff;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05)}

body.light .nav-btn:hover{background:#f3f4f6;color:#111827}
body.light .nav-btn.active{background:#eff6ff;color:var(--accent)}
body.light .stat-card{background:#fff;border:1px solid #e5e7eb}
body.light .prev-bg{background:#f3f4f6}
body.light .searchbox{background:#f3f4f6;border:1px solid #e5e7eb;color:#111827}
body.light .searchbox:focus{background:#fff;border-color:var(--accent);outline:none}
body.light .login-bg{background:linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%)}

body.dark .nav-btn:hover{background:#1e2330;color:#f1f5f9}
body.dark .nav-btn.active{background:rgba(37,99,235,.15);color:#60a5fa}
body.dark .stat-card{background:#161b27;border:1px solid #2d3748}
body.dark .prev-bg{background:#0f1117}
body.dark .searchbox{background:#161b27;border:1px solid #2d3748;color:#f1f5f9}
body.dark .searchbox:focus{background:#1e2330;border-color:var(--accent);outline:none}
body.dark .login-bg{background:linear-gradient(135deg,#0f1117 0%,#1a1f2e 100%)}
body.dark .toast{background:#1e2330;border:1px solid #374151;color:#f1f5f9;box-shadow:0 4px 20px rgba(0,0,0,.3)}
body.dark .empty-box{background:#161b27;border:2px dashed #2d3748}
body.dark .badge{background:#2d3748;color:#94a3b8}

body.dark .btn-danger:hover{background:rgba(220,38,38,.25)!important}
body.dark .divline{border-color:#2d3748}

button{cursor:pointer;font-family:var(--font);border:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;border:none;padding:7px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;transition:opacity .2s}
.btn-ghost:hover{opacity:.65}
.btn-danger{background:#fee2e2;color:var(--danger);border:none}

input,select{font-family:var(--font)}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;max-width:320px;pointer-events:all}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.info{border-left:3px solid var(--accent)}

.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:999px}
body.dark ::-webkit-scrollbar-thumb{background:#374151}

  .mobile-full{width:100%!important}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr)!important}
  .docs-grid{grid-template-columns:repeat(1,1fr)!important}
}

/* ── HELPERS ── */
function fmtSize(b){if(!b||b===0)return'—';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function getExt(name){return(name||'').split('.').pop().toLowerCase();}
function getFileIcon(name){const e=getExt(name);if(['jpg','jpeg','png','gif','webp'].includes(e))return'🖼️';if(e==='pdf')return'📄';if(['doc','docx'].includes(e))return'📝';if(['xls','xlsx'].includes(e))return'📊';if(['ppt','pptx'].includes(e))return'📑';return'📁';}
function isImage(name){return['jpg','jpeg','png','gif','webp'].includes(getExt(name));}
function isPDF(name){return getExt(name)==='pdf';}

/* ── GOOGLE DRIVE API (read-only via API Key) ── */
const GDrive={
  async listFiles(){
    const q=encodeURIComponent(`'${FOLDER_ID}' in parents and trashed=false`);
    const fields='files(id,name,size,createdTime,mimeType,description,webViewLink,thumbnailLink)';
    const url=`https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&orderBy=createdTime+desc&pageSize=100&key=${API_KEY}`;
    const res=await fetch(url);
    if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||'Failed to load files');}
    const data=await res.json();
    return(data.files||[]).map(f=>{
      let meta={docName:f.name,category:'Other',uploadedAt:new Date(f.createdTime).getTime()};
      try{if(f.description)Object.assign(meta,JSON.parse(f.description));}catch{}
      return{
        id:f.id,name:meta.docName,category:meta.category,
        uploadedAt:meta.uploadedAt,fileName:f.name,
        size:parseInt(f.size)||0,mimeType:f.mimeType,
        driveLink:f.webViewLink,
        thumbnail:f.thumbnailLink,
        previewUrl:`https://drive.google.com/file/d/${f.id}/preview`,
        downloadUrl:`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media&key=${API_KEY}`,
        directUrl:`https://drive.google.com/uc?export=download&id=${f.id}`
      };
    });
  }
};

/* ── TOAST HOOK ── */
function useToasts(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500);
  },[]);
  return{toasts,toast:add};
}
function Toasts({list}){
  const ico={success:'✅',error:'❌',info:'ℹ️'};
  return<div className="toast-wrap">{list.map(t=><div key={t.id} className={'toast '+t.type}>{ico[t.type]}<span>{t.msg}</span></div>)}</div>;
}

/* ── LOGIN PAGE ── */
function LoginPage({onLogin,dark,toggleDark}){
  const[em,setEm]=useState('');const[pw,setPw]=useState('');
  const[err,setErr]=useState('');const[busy,setBusy]=useState(false);const[show,setShow]=useState(false);
  function submit(e){
    e.preventDefault();setBusy(true);setErr('');
    setTimeout(()=>{
      if(em===VAULT_CREDS.email&&pw===VAULT_CREDS.password)onLogin();
      else setErr('Invalid email or password.');
      setBusy(false);
    },700);
  }
  return(
    <div className="login-bg" style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',position:'relative'}}>
      <button onClick={toggleDark} className="btn-ghost" style={{position:'absolute',top:'20px',right:'20px',border:'1px solid rgba(128,128,128,.2)',borderRadius:'50%',width:'40px',height:'40px'}}>
        {dark?<I.Sun/>:<I.Moon/>}
      </button>
      <div className="card" style={{width:'100%',maxWidth:'420px',borderRadius:'24px',padding:'44px 40px'}}>
        <div style={{textAlign:'center',marginBottom:'36px'}}>
          <div style={{width:'70px',height:'70px',background:'linear-gradient(135deg,#2563eb,#7c3aed)',borderRadius:'20px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:'32px',boxShadow:'0 8px 24px rgba(37,99,235,.3)'}}>🗄️</div>
          <h1 style={{fontFamily:'Fraunces,serif',fontSize:'30px',fontWeight:'300',letterSpacing:'-.5px',marginBottom:'6px'}}>DocVault</h1>
          <p className="muted" style={{fontSize:'14px'}}>Your personal document manager</p>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:'16px'}}>
            <label style={{fontSize:'13px',fontWeight:'600',display:'block',marginBottom:'7px'}}>Email address</label>
            <input className="inp" type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="your@email.com" required
              style={{width:'100%',padding:'11px 14px',borderRadius:'10px',fontSize:'14px'}}/>
          </div>
          <div style={{marginBottom:'24px',position:'relative'}}>
            <label style={{fontSize:'13px',fontWeight:'600',display:'block',marginBottom:'7px'}}>Password</label>
            <input className="inp" type={show?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••••" required
              style={{width:'100%',padding:'11px 44px 11px 14px',borderRadius:'10px',fontSize:'14px'}}/>
            <button type="button" onClick={()=>setShow(!show)}
              style={{position:'absolute',right:'12px',top:'36px',background:'none',border:'none',opacity:.5,fontSize:'15px',cursor:'pointer'}}>
              {show?'🙈':'👁️'}
            </button>
          </div>
          {err&&<div style={{background:'#fee2e2',color:'#dc2626',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'16px'}}>⚠️ {err}</div>}
          <button type="submit" className="btn btn-primary" style={{width:'100%',padding:'13px',borderRadius:'10px',fontSize:'15px',fontWeight:'600',justifyContent:'center'}} disabled={busy}>
            {busy&&<span className="spin" style={{marginRight:'4px'}}>⏳</span>}
            {busy?'Signing in…':'Sign In'}
          </button>
        </form>
        <div style={{marginTop:'24px',padding:'14px',borderRadius:'10px',background:'rgba(37,99,235,.06)',display:'flex',alignItems:'flex-start',gap:'10px'}}>
          <I.Drive/>
          <p style={{fontSize:'12px',lineHeight:'1.6'}} className="muted">Files are loaded directly from Google Drive. No sign-in to Google required — files are accessible instantly.</p>
        </div>
      </div>
    </div>
  );
}

/* ── PREVIEW MODAL ── */
function PreviewModal({doc,onClose,toast}){
  const isImg=isImage(doc.fileName);
  const isPdf=isPDF(doc.fileName);

  function download(){
    window.open(doc.directUrl,'_blank');
    toast('Opening download…','success');
  }
  function openDrive(){
    window.open(doc.driveLink,'_blank');
  }

  return(
    <div className="modal-bg" style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'12px'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal card" style={{width:'100%',maxWidth:'920px',maxHeight:'93vh',borderRadius:'20px',overflow:'hidden',display:'flex',flexDirection:'column'}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 20px',flexShrink:0,borderBottom:'1px solid rgba(128,128,128,.12)'}}>
          <span style={{fontSize:'22px'}}>{CAT_ICO[doc.category]||'📁'}</span>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontWeight:'700',fontSize:'15px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{doc.name}</p>
            <p className="muted" style={{fontSize:'12px'}}>{doc.fileName} · {fmtSize(doc.size)} · {fmtDate(doc.uploadedAt)}</p>
          </div>
          <div style={{display:'flex',gap:'8px',flexShrink:0}}>
            <button onClick={openDrive} className="btn chip" style={{padding:'7px 12px',fontSize:'13px',gap:'5px'}}><I.Link/>Open in Drive</button>
            <button onClick={download} className="btn btn-primary" style={{padding:'7px 14px',fontSize:'13px'}}><I.Download/>Download</button>
            <button onClick={onClose} className="btn-ghost"><I.X/></button>
          </div>
        </div>

        {/* Preview Area */}
        <div className="prev-bg" style={{flex:1,overflow:'auto',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',minHeight:'320px'}}>
          {isImg
            ?<img src={`https://drive.google.com/thumbnail?id=${doc.id}&sz=w1200`} alt={doc.name}
               style={{maxWidth:'100%',maxHeight:'65vh',borderRadius:'10px',boxShadow:'0 4px 24px rgba(0,0,0,.15)'}}
               onError={e=>{e.target.src=`https://lh3.googleusercontent.com/d/${doc.id}`;}}/>
            :isPdf
            ?<iframe src={doc.previewUrl} style={{width:'100%',height:'65vh',border:'none',borderRadius:'8px'}} title="PDF Preview" allow="autoplay"/>
            :<div style={{textAlign:'center',padding:'48px 32px'}}>
               <div style={{fontSize:'64px',marginBottom:'16px'}}>{getFileIcon(doc.fileName)}</div>
               <p style={{fontWeight:'600',fontSize:'16px',marginBottom:'8px'}}>{doc.fileName}</p>
               <p className="muted" style={{fontSize:'14px',marginBottom:'28px'}}>Preview not available for this file type</p>
               <div style={{display:'flex',gap:'10px',justifyContent:'center',flexWrap:'wrap'}}>
                 <button onClick={download} className="btn btn-primary"><I.Download/>Download File</button>
                 <button onClick={openDrive} className="btn chip" style={{gap:'5px'}}><I.Link/>View in Drive</button>
               </div>
             </div>}
        </div>

        {/* Footer */}
        <div style={{padding:'10px 20px',borderTop:'1px solid rgba(128,128,128,.1)',display:'flex',alignItems:'center',gap:'10px',flexShrink:0}}>
          <I.Drive/>
          <span className="muted" style={{fontSize:'12px'}}>Stored in Google Drive · DocVault folder</span>
          <span style={{marginLeft:'auto',background:CAT_CLR[doc.category]+'20',color:CAT_CLR[doc.category],fontSize:'11px',fontWeight:'700',padding:'2px 10px',borderRadius:'999px'}}>{doc.category}</span>
        </div>
      </div>
    </div>
  );
}

/* ── DOC CARD (Grid) ── */
function DocCard({doc,onPreview}){
  const clr=CAT_CLR[doc.category]||'#6b7280';
  const hasThumb=doc.thumbnail&&isImage(doc.fileName);
  return(
    <div className="doc-card" style={{borderRadius:'16px',overflow:'hidden',cursor:'pointer'}} onClick={onPreview}>
      <div style={{height:'110px',background:clr+'12',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'44px',position:'relative',overflow:'hidden'}}>
        {hasThumb
          ?<img src={doc.thumbnail} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
          :<span>{CAT_ICO[doc.category]||'📁'}</span>}
        <span style={{position:'absolute',top:'8px',left:'8px',background:clr,color:'#fff',fontSize:'10px',fontWeight:'700',padding:'2px 9px',borderRadius:'999px',letterSpacing:'.03em'}}>{doc.category}</span>
      </div>
      <div style={{padding:'13px 14px'}}>
        <p style={{fontWeight:'600',fontSize:'14px',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={doc.name}>{doc.name}</p>
        <p className="muted" style={{fontSize:'11px',marginBottom:'12px'}}>{fmtSize(doc.size)} · {fmtDate(doc.uploadedAt)}</p>
        <button onClick={e=>{e.stopPropagation();onPreview();}} className="btn" style={{width:'100%',justifyContent:'center',padding:'8px',fontSize:'12px',borderRadius:'8px',background:'rgba(37,99,235,.1)',color:'var(--accent)',border:'none',fontWeight:'600'}}>
          <I.Eye/>Preview & Download
        </button>
      </div>
    </div>
  );
}

/* ── DOC ROW (List) ── */
function DocRow({doc,onPreview}){
  const clr=CAT_CLR[doc.category]||'#6b7280';
  return(
    <div className="doc-card" style={{borderRadius:'12px',padding:'12px 16px',display:'flex',alignItems:'center',gap:'14px',cursor:'pointer'}} onClick={onPreview}>
      <div style={{width:'46px',height:'46px',background:clr+'12',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',flexShrink:0}}>
        {CAT_ICO[doc.category]||'📁'}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontWeight:'600',fontSize:'14px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{doc.name}</p>
        <p className="muted" style={{fontSize:'12px'}}>{doc.fileName} · {fmtSize(doc.size)} · {fmtDate(doc.uploadedAt)}</p>
      </div>
      <span style={{background:clr+'18',color:clr,fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'999px',flexShrink:0,whiteSpace:'nowrap'}}>{doc.category}</span>
      <button onClick={e=>{e.stopPropagation();onPreview();}} className="btn" style={{padding:'8px 14px',fontSize:'13px',borderRadius:'8px',background:'rgba(37,99,235,.1)',color:'var(--accent)',border:'none',gap:'5px',flexShrink:0,fontWeight:'600'}}>
        <I.Eye/>Preview
      </button>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({dark,toggleDark,onLogout,toast}){
  const[docs,setDocs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState('');
  const[preview,setPreview]=useState(null);
  const[search,setSearch]=useState('');
  const[filterCat,setFilterCat]=useState('All');
  const[viewMode,setViewMode]=useState('grid');
  const[activeNav,setActiveNav]=useState('all');
  const[sideOpen,setSideOpen]=useState(window.innerWidth>768);
  const[isMobile,setIsMobile]=useState(window.innerWidth<=768);

  useEffect(()=>{
    const fn=()=>{const m=window.innerWidth<=768;setIsMobile(m);if(!m)setSideOpen(true);else setSideOpen(false);};
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[]);

  async function loadDocs(){
    setLoading(true);setError('');
    try{const files=await GDrive.listFiles();setDocs(files);if(files.length===0)toast('No files found in your DocVault folder yet.','info');}
    catch(e){setError(e.message);toast('Could not load files: '+e.message,'error');}
    setLoading(false);
  }
  useEffect(()=>{loadDocs();},[]);

  const filtered=docs.filter(d=>{
    const q=search.toLowerCase();
    if(q&&!d.name.toLowerCase().includes(q)&&!d.category.toLowerCase().includes(q)&&!d.fileName.toLowerCase().includes(q))return false;
    if(filterCat!=='All'&&d.category!==filterCat)return false;
    if(activeNav!=='all'&&d.category!==activeNav)return false;
    return true;
  });

  const total=docs.length;
  const totalSize=docs.reduce((a,d)=>a+d.size,0);
  const byCat=CATS.reduce((a,c)=>{a[c]=docs.filter(d=>d.category===c).length;return a;},{});
  const navItems=[{id:'all',label:'All Documents',icon:'📂'},...CATS.map(c=>({id:c,label:c,icon:CAT_ICO[c]}))];

  const SidebarContent=(
    <div style={{display:'flex',flexDirection:'column',height:'100%',minWidth:'240px'}}>
      <div style={{padding:'20px 16px',flex:1,overflowY:'auto'}}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'28px',paddingLeft:'4px'}}>
          <div style={{width:'38px',height:'38px',background:'linear-gradient(135deg,#2563eb,#7c3aed)',borderRadius:'11px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:0,boxShadow:'0 4px 12px rgba(37,99,235,.25)'}}>🗄️</div>
          <span style={{fontFamily:'Fraunces,serif',fontWeight:'300',fontSize:'21px',letterSpacing:'-.3px'}}>DocVault</span>
        </div>

        {/* Read-only notice */}
        <div style={{background:'rgba(217,119,6,.08)',border:'1px solid rgba(217,119,6,.2)',borderRadius:'10px',padding:'10px 12px',marginBottom:'20px',display:'flex',gap:'8px',alignItems:'flex-start'}}>
          <I.Info/>
          <p style={{fontSize:'12px',color:'#92400e',lineHeight:'1.5',fontWeight:'500'}}>View & download mode. To upload files, add them directly to the DocVault folder in Google Drive.</p>
        </div>

        <p className="muted" style={{fontSize:'10px',fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'8px',paddingLeft:'8px'}}>Categories</p>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>{setActiveNav(n.id);if(isMobile)setSideOpen(false);}}
            className={'nav-btn'+(activeNav===n.id?' active':'')}
            style={{width:'100%',padding:'9px 12px',borderRadius:'9px',border:'none',display:'flex',alignItems:'center',gap:'10px',fontSize:'14px',fontWeight:'500',cursor:'pointer',marginBottom:'2px',textAlign:'left',transition:'all .15s'}}>
            <span style={{fontSize:'16px'}}>{n.icon}</span>
            <span style={{flex:1}}>{n.label}</span>
            {n.id!=='all'&&byCat[n.id]>0&&(
              <span style={{background:CAT_CLR[n.id]+'20',color:CAT_CLR[n.id],fontSize:'11px',fontWeight:'700',padding:'1px 8px',borderRadius:'999px'}}>{byCat[n.id]}</span>
            )}
          </button>
        ))}

        {/* Drive info */}
        <div style={{marginTop:'20px',paddingTop:'16px',borderTop:'1px solid rgba(128,128,128,.1)'}}>
          <p className="muted" style={{fontSize:'10px',fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'10px',paddingLeft:'8px'}}>Storage</p>
          <div className="stat-card" style={{padding:'12px 14px',borderRadius:'10px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'8px'}}><I.Drive/><span style={{fontSize:'12px',fontWeight:'600'}}>Google Drive</span></div>
            <p style={{fontSize:'13px',marginBottom:'3px'}}><b>{total}</b> files available</p>
            <p className="muted" style={{fontSize:'12px'}}>{fmtSize(totalSize)} total</p>
            <a href={`https://drive.google.com/drive/folders/${FOLDER_ID}`} target="_blank" rel="noreferrer"
              style={{display:'inline-flex',alignItems:'center',gap:'4px',fontSize:'12px',color:'var(--accent)',textDecoration:'none',marginTop:'8px',fontWeight:'600'}}>
              <I.Link/>Open Folder ↗
            </a>
          </div>
        </div>
      </div>

      {/* User Footer */}
      <div style={{padding:'12px 16px',borderTop:'1px solid rgba(128,128,128,.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{width:'35px',height:'35px',background:'linear-gradient(135deg,#2563eb,#7c3aed)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'13px',fontWeight:'700',flexShrink:0}}>MR</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:'13px',fontWeight:'600',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Mohith Reddy</p>
            <p className="muted" style={{fontSize:'11px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>mohithreddy@gmail.com</p>
          </div>
          <button onClick={onLogout} className="btn-ghost" style={{opacity:.6,flexShrink:0}} title="Sign Out"><I.Logout/></button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh',position:'relative'}}>
      {/* Desktop Sidebar */}
      {!isMobile&&(
        <aside className="sidebar" style={{width:sideOpen?'256px':'0',flexShrink:0,overflow:'hidden',transition:'width .3s',zIndex:50}}>
          {SidebarContent}
        </aside>
      )}
      {/* Mobile Sidebar Overlay */}
      {isMobile&&sideOpen&&(
        <div style={{position:'fixed',inset:0,zIndex:200,display:'flex'}}>
          <div className="sidebar" style={{width:'256px',boxShadow:'4px 0 24px rgba(0,0,0,.2)'}}>{SidebarContent}</div>
          <div style={{flex:1,background:'rgba(0,0,0,.45)'}} onClick={()=>setSideOpen(false)}/>
        </div>
      )}

      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {/* Topbar */}
        <div className="topbar" style={{padding:'11px 18px',display:'flex',alignItems:'center',gap:'10px',flexShrink:0}}>
          <button onClick={()=>setSideOpen(!sideOpen)} className="btn-ghost"><I.Menu/></button>
          <div style={{position:'relative',flex:1,maxWidth:'400px'}}>
            <span style={{position:'absolute',left:'11px',top:'50%',transform:'translateY(-50%)',opacity:.4,pointerEvents:'none'}}><I.Search/></span>
            <input className="searchbox" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or category…"
              style={{width:'100%',padding:'9px 12px 9px 34px',borderRadius:'10px',fontSize:'14px',border:'1px solid'}}/>
          </div>
          <div style={{display:'flex',gap:'6px',marginLeft:'auto',alignItems:'center'}}>
            <select className="chip hide-m" value={filterCat} onChange={e=>setFilterCat(e.target.value)}
              style={{padding:'7px 10px',borderRadius:'8px',fontSize:'13px',cursor:'pointer',border:'1px solid'}}>
              <option>All</option>{CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <button onClick={()=>setViewMode(v=>v==='grid'?'list':'grid')} className="chip btn" style={{padding:'8px',borderRadius:'8px',border:'1px solid'}} title="Toggle view">
              {viewMode==='grid'?<I.List/>:<I.Grid/>}
            </button>
            <button onClick={loadDocs} className="chip btn" style={{padding:'8px',borderRadius:'8px',border:'1px solid'}} title="Refresh files">
              <span className={loading?'spin':''}><I.Refresh/></span>
            </button>
            <button onClick={toggleDark} className="chip btn" style={{padding:'8px',borderRadius:'8px',border:'1px solid'}} title="Toggle theme">
              {dark?<I.Sun/>:<I.Moon/>}
            </button>
            <a href={`https://drive.google.com/drive/folders/${FOLDER_ID}`} target="_blank" rel="noreferrer"
              className="btn btn-primary hide-m" style={{padding:'9px 14px',borderRadius:'10px',textDecoration:'none',gap:'6px'}}>
              <I.Drive/>Add Files
            </a>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflow:'auto',padding:'18px 22px'}}>

          {/* Stats Row */}
          <div className="stats-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'10px',marginBottom:'22px'}}>
            {[
              {label:'Total Files',val:total,icon:'📂',clr:'#2563eb'},
              {label:'Resumes',val:byCat['Resume'],icon:'📄',clr:'#2563eb'},
              {label:'Mark Lists',val:byCat['Mark List'],icon:'📊',clr:'#7c3aed'},
              {label:'IDs & Cards',val:(byCat['Aadhaar']||0)+(byCat['PAN Card']||0),icon:'🪪',clr:'#dc2626'},
              {label:'Exp. Letters',val:byCat['Experience Letter'],icon:'📜',clr:'#059669'},
              {label:'Total Size',val:fmtSize(totalSize),icon:'💾',clr:'#6b7280'},
            ].map((s,i)=>(
              <div key={i} className="stat-card" style={{padding:'13px 14px',borderRadius:'12px',display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'36px',height:'36px',background:s.clr+'12',borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:0}}>{s.icon}</div>
                <div>
                  <p className="muted" style={{fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}}>{s.label}</p>
                  <p style={{fontSize:'19px',fontWeight:'700',lineHeight:'1.1'}}>{s.val}</p>
                </div>
              </div>
            ))}
          </div>

          {/* Section heading */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
            <h2 style={{fontSize:'15px',fontWeight:'700'}}>
              {activeNav==='all'?'All Documents':activeNav}
              {!loading&&<span className="muted" style={{fontWeight:'400',marginLeft:'8px',fontSize:'14px'}}>({filtered.length})</span>}
            </h2>
            {!loading&&total>0&&(
              <p className="muted" style={{fontSize:'12px',display:'flex',alignItems:'center',gap:'5px'}}>
                <I.Drive/>Synced from Google Drive
              </p>
            )}
          </div>

          {/* States */}
          {loading?(
            <div style={{textAlign:'center',padding:'80px 20px'}}>
              <div className="spin" style={{fontSize:'48px',display:'block',marginBottom:'16px'}}>⏳</div>
              <p style={{fontWeight:'600',marginBottom:'6px'}}>Loading your documents…</p>
              <p className="muted" style={{fontSize:'14px'}}>Fetching files from Google Drive</p>
            </div>
          ):error?(
            <div style={{textAlign:'center',padding:'60px 20px'}}>
              <div style={{fontSize:'48px',marginBottom:'14px'}}>⚠️</div>
              <h3 style={{fontWeight:'600',marginBottom:'8px'}}>Could not load files</h3>
              <p className="muted" style={{fontSize:'14px',marginBottom:'8px'}}>{error}</p>
              <p className="muted" style={{fontSize:'13px',marginBottom:'24px'}}>Make sure your Drive folder is shared as "Anyone with the link – Viewer"</p>
              <button onClick={loadDocs} className="btn btn-primary"><I.Refresh/>Try Again</button>
            </div>
          ):filtered.length===0?(
            <div className="empty-box" style={{borderRadius:'16px',padding:'60px 20px',textAlign:'center'}}>
              <div style={{fontSize:'52px',marginBottom:'14px'}}>{search?'🔍':'🗂️'}</div>
              <h3 style={{fontWeight:'600',marginBottom:'8px'}}>{search?'No results found':'No documents yet'}</h3>
              <p className="muted" style={{fontSize:'14px',marginBottom:'24px'}}>
                {search?'Try a different search term':'Upload files directly to your DocVault folder in Google Drive'}
              </p>
              {!search&&(
                <a href={`https://drive.google.com/drive/folders/${FOLDER_ID}`} target="_blank" rel="noreferrer"
                  className="btn btn-primary" style={{textDecoration:'none',gap:'8px'}}>
                  <I.Drive/>Open Drive Folder
                </a>
              )}
            </div>
          ):viewMode==='grid'?(
            <div className="docs-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:'14px'}}>
              {filtered.map(d=><DocCard key={d.id} doc={d} onPreview={()=>setPreview(d)}/>)}
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              {filtered.map(d=><DocRow key={d.id} doc={d} onPreview={()=>setPreview(d)}/>)}
            </div>
          )}

          {/* How to add files tip */}
          {!loading&&!error&&total>0&&(
            <div style={{marginTop:'28px',padding:'14px 18px',borderRadius:'12px',background:'rgba(37,99,235,.05)',border:'1px solid rgba(37,99,235,.12)',display:'flex',alignItems:'center',gap:'12px'}}>
              <I.Info/>
              <p style={{fontSize:'13px',flex:1}} className="muted">
                To add new documents, upload them directly to your <b>DocVault</b> folder in Google Drive, then click the <b>Refresh</b> button above.
              </p>
              <a href={`https://drive.google.com/drive/folders/${FOLDER_ID}`} target="_blank" rel="noreferrer"
                style={{fontSize:'13px',color:'var(--accent)',textDecoration:'none',fontWeight:'600',flexShrink:0,display:'flex',alignItems:'center',gap:'4px'}}>
                <I.Link/>Open Drive
              </a>
            </div>
          )}
        </div>
      </main>

      {preview&&<PreviewModal doc={preview} onClose={()=>setPreview(null)} toast={toast}/>}
    </div>
  );
}

/* ── APP ROOT ── */
const SESSION_KEY='dv_logged_in';
const DARK_KEY='dv_dark';

function App(){
  /* Read login state from localStorage so refresh keeps you on dashboard */
  const[page,setPage]=useState(()=>localStorage.getItem(SESSION_KEY)==='1'?'dashboard':'login');
  /* Restore dark mode preference across refreshes */
  const[dark,setDark]=useState(()=>localStorage.getItem(DARK_KEY)==='1');
  const{toasts,toast}=useToasts();

  /* Apply theme on first render */
  useEffect(()=>{
    document.body.className=localStorage.getItem(DARK_KEY)==='1'?'dark':'light';
  },[]);

  function toggleDark(){
    setDark(d=>{
      const next=!d;
      document.body.className=next?'dark':'light';
      localStorage.setItem(DARK_KEY,next?'1':'0');
      return next;
    });
  }

  function handleLogin(){
    localStorage.setItem(SESSION_KEY,'1');
    setPage('dashboard');
  }

  function handleLogout(){
    localStorage.removeItem(SESSION_KEY);
    document.body.className='light';
    setDark(false);
    setPage('login');
  }

  return(
    <>
      {page==='login'&&<LoginPage onLogin={handleLogin} dark={dark} toggleDark={toggleDark}/>}
      {page==='dashboard'&&<Dashboard dark={dark} toggleDark={toggleDark} onLogout={handleLogout} toast={toast}/>}
      <Toasts list={toasts}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
